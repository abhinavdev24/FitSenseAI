# FitSenseAI — QLoRA SFT Training Configuration
# Student model: Qwen3-8B with LoRA adapter via Unsloth + TRL

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_name: "unsloth/qwen3-4b-unsloth-bnb-4bit"
max_seq_length: 16500

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
train_path: "Model-Pipeline/data/training/train.jsonl"
val_path: "Model-Pipeline/data/training/val.jsonl"

# ---------------------------------------------------------------------------
# LoRA
# ---------------------------------------------------------------------------
lora_r: 8
lora_alpha: 16
lora_dropout: 0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 3
learning_rate: 0.000346015
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
bf16: true
fp16: false
max_grad_norm: 1.0

# ---------------------------------------------------------------------------
# Evaluation & saving
# ---------------------------------------------------------------------------
eval_strategy: "no"
logging_steps: 1
eval_steps: 10
save_steps: 10
save_total_limit: 30

# ---------------------------------------------------------------------------
# Experiment tracking
# ---------------------------------------------------------------------------
report_to: "wandb"
wandb_project: "fitsense-sft"

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output_dir: "Model-Pipeline/outputs"
