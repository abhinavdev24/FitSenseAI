<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 830" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c084fc"/>
    </marker>
    <linearGradient id="grad-upstream" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-pipeline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="830" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b">FitSenseAI Model Pipeline</text>
  <text x="310" y="52" text-anchor="middle" font-size="11" fill="#64748b">End-to-End Flow</text>

  <!-- Upstream box -->
  <rect x="150" y="66" width="320" height="58" rx="10" fill="url(#grad-upstream)" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af" letter-spacing="1">UPSTREAM — DATA PIPELINE</text>
  <text x="310" y="106" text-anchor="middle" font-size="11" fill="#334155">Synthetic Profiles → Queries → Teacher LLM</text>
  <text x="310" y="120" text-anchor="middle" font-size="10" fill="#64748b">responses.jsonl (800 samples)</text>

  <!-- Arrow: Upstream → Prepare -->
  <line x1="310" y1="124" x2="310" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Prepare training data -->
  <rect x="175" y="142" width="270" height="38" rx="8" fill="#fff" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">prepare_training_data.py</text>
  <text x="310" y="174" text-anchor="middle" font-size="10" fill="#64748b">Extract &lt;think&gt; + JSON → train / val JSONL</text>

  <!-- Arrow: Prepare → Pipeline -->
  <line x1="310" y1="180" x2="310" y2="198" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MODEL PIPELINE container                    -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="30" y="200" width="760" height="530" rx="12" fill="url(#grad-pipeline)" stroke="#86efac" stroke-width="1.5"/>
  <text x="80" y="222" font-size="10" font-weight="600" fill="#166534" letter-spacing="1">MODEL PIPELINE</text>

  <!-- Phase 1: Load Data -->
  <rect x="180" y="234" width="260" height="46" rx="8" fill="#fff" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="254" font-size="9" font-weight="700" fill="#3b82f6">PHASE 1</text>
  <text x="310" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Load Data</text>
  <text x="310" y="272" text-anchor="middle" font-size="10" fill="#64748b">load_data.py</text>

  <!-- Arrow -->
  <line x1="310" y1="280" x2="310" y2="294" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Hparam Search -->
  <rect x="180" y="296" width="260" height="46" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="316" font-size="9" font-weight="700" fill="#d97706">PHASE 3</text>
  <text x="310" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Hparam Search</text>
  <text x="310" y="334" text-anchor="middle" font-size="10" fill="#64748b">hparam_search.py · Optuna Bayesian</text>

  <!-- Arrow -->
  <line x1="310" y1="342" x2="310" y2="356" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Train -->
  <rect x="180" y="358" width="260" height="46" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="378" font-size="9" font-weight="700" fill="#059669">PHASE 2</text>
  <text x="310" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Train (QLoRA SFT)</text>
  <text x="310" y="396" text-anchor="middle" font-size="10" fill="#64748b">train.py · Unsloth + TRL</text>

  <!-- W&B badge (side) -->
  <rect x="490" y="362" width="90" height="28" rx="14" fill="#FFCC00" stroke="#e6b800" stroke-width="1" filter="url(#shadow)"/>
  <text x="535" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1a2e">W&amp;B</text>
  <line x1="440" y1="381" x2="490" y2="377" stroke="#e6b800" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow -->
  <line x1="310" y1="404" x2="310" y2="418" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Evaluate -->
  <rect x="180" y="420" width="260" height="46" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="440" font-size="9" font-weight="700" fill="#7c3aed">PHASE 4</text>
  <text x="310" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Evaluate</text>
  <text x="310" y="458" text-anchor="middle" font-size="10" fill="#64748b">evaluate.py · metrics + plots</text>

  <!-- Outputs badge (side) -->
  <rect x="490" y="424" width="170" height="38" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" filter="url(#shadow)"/>
  <text x="575" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Outputs</text>
  <text x="575" y="454" text-anchor="middle" font-size="9" fill="#78716c">metrics, plots, reports, adapter</text>
  <line x1="440" y1="443" x2="490" y2="443" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow -->
  <line x1="310" y1="466" x2="310" y2="480" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: Bias Detection -->
  <rect x="180" y="482" width="260" height="46" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="502" font-size="9" font-weight="700" fill="#dc2626">PHASE 5</text>
  <text x="310" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Bias Detection</text>
  <text x="310" y="520" text-anchor="middle" font-size="10" fill="#64748b">bias_detection.py · demographic slicing</text>

  <!-- Arrow -->
  <line x1="310" y1="528" x2="310" y2="542" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 6: Sensitivity -->
  <rect x="180" y="544" width="260" height="46" rx="8" fill="#fff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="564" font-size="9" font-weight="700" fill="#db2777">PHASE 6</text>
  <text x="310" y="564" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Sensitivity Analysis</text>
  <text x="310" y="582" text-anchor="middle" font-size="10" fill="#64748b">sensitivity.py · hparam + input</text>

  <!-- Arrow -->
  <line x1="310" y1="590" x2="310" y2="604" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 7: Select Model -->
  <rect x="180" y="606" width="260" height="46" rx="8" fill="#fff" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="626" font-size="9" font-weight="700" fill="#0891b2">PHASE 7</text>
  <text x="310" y="626" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Select Model</text>
  <text x="310" y="644" text-anchor="middle" font-size="10" fill="#64748b">select_model.py · weighted scoring</text>

  <!-- Arrow -->
  <line x1="310" y1="652" x2="310" y2="666" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 8: Push to Registry -->
  <rect x="180" y="668" width="260" height="46" rx="8" fill="#fff" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="198" y="688" font-size="9" font-weight="700" fill="#0d9488">PHASE 8</text>
  <text x="310" y="688" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Push to Registry</text>
  <text x="310" y="706" text-anchor="middle" font-size="10" fill="#64748b">push_to_registry.py</text>

  <!-- GCS badge (side) -->
  <rect x="490" y="672" width="200" height="38" rx="19" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="688" text-anchor="middle" font-size="11" font-weight="600" fill="#0369a1">GCP Artifact Registry</text>
  <text x="590" y="702" text-anchor="middle" font-size="9" fill="#64748b">gs://fitsense-models/</text>
  <line x1="440" y1="691" x2="490" y2="691" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CI/CD bar at bottom                         -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="100" y="755" width="620" height="50" rx="10" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="777" text-anchor="middle" font-size="10" font-weight="600" fill="#7e22ce" letter-spacing="1">CI/CD — GITHUB ACTIONS</text>
  <text x="410" y="793" text-anchor="middle" font-size="11" fill="#334155">lint → train → evaluate → bias-check → registry-push → notify</text>

  <!-- Dashed line from pipeline to CI/CD -->
  <line x1="310" y1="710" x2="310" y2="755" stroke="#c084fc" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
</svg>
