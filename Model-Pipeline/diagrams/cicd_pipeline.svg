<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="s" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000012"/>
    </filter>
  </defs>

  <rect width="960" height="340" rx="12" fill="#fafbfc"/>
  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">CI/CD Pipeline — GitHub Actions</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">Triggered on push to Model-Pipeline/ on main branch</text>

  <!-- Job 1: Lint & Test -->
  <rect x="32" y="80" width="140" height="140" rx="10" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#s)"/>
  <text x="102" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Lint &amp; Test</text>
  <line x1="52" y1="114" x2="152" y2="114" stroke="#bfdbfe" stroke-width="1"/>
  <text x="102" y="134" text-anchor="middle" font-size="11" fill="#475569">ruff check</text>
  <text x="102" y="152" text-anchor="middle" font-size="11" fill="#475569">pyright</text>
  <text x="102" y="170" text-anchor="middle" font-size="11" fill="#475569">pytest</text>
  <rect x="52" y="184" width="100" height="20" rx="10" fill="#dbeafe"/>
  <text x="102" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">ubuntu-latest</text>

  <!-- Arrow -->
  <line x1="172" y1="150" x2="208" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Job 2: Train -->
  <rect x="210" y="80" width="140" height="140" rx="10" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" filter="url(#s)"/>
  <text x="280" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Train</text>
  <line x1="230" y1="114" x2="330" y2="114" stroke="#bbf7d0" stroke-width="1"/>
  <text x="280" y="134" text-anchor="middle" font-size="11" fill="#475569">hparam search</text>
  <text x="280" y="152" text-anchor="middle" font-size="11" fill="#475569">QLoRA SFT</text>
  <text x="280" y="170" text-anchor="middle" font-size="11" fill="#475569">save adapter</text>
  <rect x="230" y="184" width="100" height="20" rx="10" fill="#dcfce7"/>
  <text x="280" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">GPU runner</text>

  <!-- Arrow -->
  <line x1="350" y1="150" x2="386" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Job 3: Evaluate -->
  <rect x="388" y="80" width="140" height="140" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5" filter="url(#s)"/>
  <text x="458" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Evaluate</text>
  <line x1="408" y1="114" x2="508" y2="114" stroke="#ddd6fe" stroke-width="1"/>
  <text x="458" y="134" text-anchor="middle" font-size="11" fill="#475569">val loss</text>
  <text x="458" y="152" text-anchor="middle" font-size="11" fill="#475569">tool accuracy</text>
  <text x="458" y="170" text-anchor="middle" font-size="11" fill="#475569">metrics + plots</text>
  <rect x="408" y="184" width="100" height="20" rx="10" fill="#ede9fe"/>
  <text x="458" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">GPU runner</text>

  <!-- Arrow -->
  <line x1="528" y1="150" x2="564" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Job 4: Bias Check -->
  <rect x="566" y="80" width="140" height="140" rx="10" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" filter="url(#s)"/>
  <text x="636" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Bias Check</text>
  <line x1="586" y1="114" x2="686" y2="114" stroke="#fecaca" stroke-width="1"/>
  <text x="636" y="134" text-anchor="middle" font-size="11" fill="#475569">slice by demo</text>
  <text x="636" y="152" text-anchor="middle" font-size="11" fill="#475569">flag disparities</text>
  <text x="636" y="170" text-anchor="middle" font-size="11" fill="#475569">block if &gt;25%</text>
  <rect x="586" y="184" width="100" height="20" rx="10" fill="#fee2e2"/>
  <text x="636" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">GPU runner</text>

  <!-- Arrow -->
  <line x1="706" y1="150" x2="742" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Job 5: Registry Push -->
  <rect x="744" y="80" width="140" height="140" rx="10" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="1.5" filter="url(#s)"/>
  <text x="814" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#0d9488">Registry Push</text>
  <line x1="764" y1="114" x2="864" y2="114" stroke="#99f6e4" stroke-width="1"/>
  <text x="814" y="134" text-anchor="middle" font-size="11" fill="#475569">stage package</text>
  <text x="814" y="152" text-anchor="middle" font-size="11" fill="#475569">upload to GCS</text>
  <text x="814" y="170" text-anchor="middle" font-size="11" fill="#475569">version + tag</text>
  <rect x="764" y="184" width="100" height="20" rx="10" fill="#ccfbf1"/>
  <text x="814" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#115e59">ubuntu-latest</text>

  <!-- Approval gate icon -->
  <rect x="770" y="68" width="88" height="16" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="814" y="80" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">APPROVAL GATE</text>

  <!-- Notify bar at bottom -->
  <rect x="32" y="256" width="852" height="56" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#s)"/>
  <text x="458" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">Notify (Slack)</text>
  <text x="458" y="298" text-anchor="middle" font-size="11" fill="#64748b">Runs on all outcomes: success / failure / bias-blocked — color-coded alerts with run link</text>

  <!-- Dashed lines from each job to notify -->
  <line x1="102" y1="220" x2="102" y2="256" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="220" x2="280" y2="256" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="458" y1="220" x2="458" y2="256" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="636" y1="220" x2="636" y2="256" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="814" y1="220" x2="814" y2="256" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
