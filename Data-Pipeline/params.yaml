project:
  name: fitsenseai-data-pipeline
  environment: dev

reproducibility:
  seed: 20260217
  hash_seed: "20260217"
  timezone: "UTC"

paths:
  raw_data_dir: data/raw
  interim_data_dir: data/interim
  processed_data_dir: data/processed
  reports_dir: data/reports
  logs_dir: logs
  teacher_llm_responses_dir: data/raw/teacher-llm-responses

logging:
  level: INFO
  file_name: pipeline.log
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

phase2:
  synthetic:
    as_of_date: "2026-02-17"
    num_users: 200
    lookback_days: 90
    profiles:
      max_conditions_per_user: 2
      max_medications_per_user: 2
      max_allergies_per_user: 2
    workouts:
      workouts_per_user: 12
      min_exercises_per_plan: 4
      max_exercises_per_plan: 6
      sets_per_exercise: 3
    queries:
      max_users: null # set an int to subset during dev
      queries_per_user_creation: 2
      queries_per_user_updation: 2

teacher_llm:
  provider: openrouter
  model_name: qwen/qwen3-32b
  temperature: 0.6
  max_output_tokens: 8192 # max tokens in the response (output only)
  timeout_seconds: 900 # per-request HTTP timeout
  max_workers: 90 # single-threaded by default (Groq RPM limits)
  max_queries: 800 # null = process all; set int to cap (useful for testing)
  max_retries: 3
  retry_backoff_seconds: 10.0 # base backoff; multiplied by attempt number on rate-limit
  request_delay_seconds: 0.0 # sleep between requests to stay under Groq RPM limit
  input_tokens_per_minute: 200000 # Groq hard limit for qwen3-32b input tokens/min
