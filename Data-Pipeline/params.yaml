project:
  name: fitsenseai-data-pipeline
  environment: dev

reproducibility:
  seed: 20260217
  hash_seed: "20260217"
  timezone: "UTC"

paths:
  raw_data_dir: data/raw
  interim_data_dir: data/interim
  processed_data_dir: data/processed
  reports_dir: data/reports
  logs_dir: logs

logging:
  level: INFO
  file_name: pipeline.log
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

phase2:
  synthetic:
    as_of_date: "2026-02-17"
    num_users: 2
    lookback_days: 90
    profiles:
      max_conditions_per_user: 2
      max_medications_per_user: 2
      max_allergies_per_user: 2
    workouts:
      workouts_per_user: 12
      min_exercises_per_plan: 4
      max_exercises_per_plan: 6
      sets_per_exercise: 3

phase3:
  synthetic_queries:
    prompts_per_type: 1
    prompt_types:
      - plan_creation
      - plan_modification
      - safety_adjustment
      - progress_adaptation
      - progress_comment
      - workout_logging
      - metric_logging
      - coaching_qa

phase4:
  teacher_llm:
    provider: groq
    model_name: qwen/qwen3-32b
    endpoint_url: "https://api.groq.com/openai/v1/chat/completions"
    api_key_env: GROQ_API_KEY
    timeout_seconds: 90
    max_retries: 6
    retry_backoff_seconds: 15.0
    temperature: 0.6
    top_p: 0.95
    max_output_tokens: 2048
    max_queries: 2
    request_delay_seconds: 10

phase5:
  distillation:
    min_response_chars: 30
    require_post_validation: true
    reject_on_safety_flags: true
    split:
      train_ratio: 0.8
      val_ratio: 0.1
      test_ratio: 0.1

phase6:
  anomaly_detection:
    duplicate_record_threshold: 0
    missing_response_threshold: 0
    min_response_chars: 60
    max_response_chars: 2000
    split_ratio_tolerance: 0.2
  bias_slicing:
    min_group_size: 20
    max_mean_response_len_gap: 120
