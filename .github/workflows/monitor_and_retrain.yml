name: Monitor and Retrain Pipeline

# =============================================================================
# Manually triggered only. Lints and tests deployment scripts first, then
# polls the live vLLM endpoint, checks quality thresholds, and dispatches
# the model training pipeline if the model has decayed.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      n_samples:
        description: "Number of test prompts to evaluate"
        required: false
        default: "10"
      dry_run:
        description: "Dry run (no real HTTP calls — for testing the pipeline itself)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force_retrain:
        description: "Force retraining regardless of metrics"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint and test deployment scripts
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Model-Deployment/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r Model-Deployment/requirements.txt

      - name: Lint with ruff
        run: ruff check Model-Deployment/

      - name: Run unit tests
        run: pytest Model-Deployment/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Run monitoring script against live GCE endpoint
  # ---------------------------------------------------------------------------
  monitor:
    name: Monitor live endpoint
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      thresholds_passed: ${{ steps.run-monitor.outputs.thresholds_passed }}
      metrics_summary:   ${{ steps.run-monitor.outputs.metrics_summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install monitoring dependencies
        run: |
          pip install httpx
          pip install -r Model-Deployment/requirements.txt

      - name: Run monitor
        id: run-monitor
        env:
          VLLM_API_URL: ${{ secrets.VLLM_API_URL }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
        run: |
          N_SAMPLES="${{ github.event.inputs.n_samples }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          EXTRA_FLAGS=""
          [ "${DRY_RUN}" = "true" ] && EXTRA_FLAGS="--dry-run"

          python Model-Deployment/scripts/monitor_deployment.py \
            --endpoint "${VLLM_API_URL}" \
            --api-key  "${VLLM_API_KEY}" \
            --n-samples "${N_SAMPLES}" \
            --output-dir Model-Deployment/reports \
            ${EXTRA_FLAGS} \
            && echo "thresholds_passed=true"  >> "${GITHUB_OUTPUT}" \
            || echo "thresholds_passed=false" >> "${GITHUB_OUTPUT}"

          # Capture latest report for Slack summary
          REPORT=$(ls -t Model-Deployment/reports/monitor_*.json 2>/dev/null | head -1)
          if [ -n "${REPORT}" ]; then
            JSON_RATE=$(python3 -c "import json; d=json.load(open('${REPORT}')); print(d['metrics']['json_validity_rate'])")
            SCHEMA_RATE=$(python3 -c "import json; d=json.load(open('${REPORT}')); print(d['metrics']['schema_compliance'])")
            LATENCY=$(python3 -c "import json; d=json.load(open('${REPORT}')); print(d['metrics']['avg_latency_ms'])")
            echo "metrics_summary=json_validity=${JSON_RATE} schema=${SCHEMA_RATE} latency=${LATENCY}ms" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload monitoring report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report-${{ github.run_id }}
          path: Model-Deployment/reports/monitor_*.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Trigger retraining if thresholds failed
  # ---------------------------------------------------------------------------
  trigger-retrain:
    name: Trigger model retraining pipeline
    runs-on: ubuntu-latest
    needs: monitor
    if: >
      needs.monitor.outputs.thresholds_passed == 'false' ||
      github.event.inputs.force_retrain == 'true'

    steps:
      - name: Dispatch model_pipeline.yml
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/model_pipeline.yml/dispatches" \
            -d '{"ref": "main"}')
          echo "GitHub API response: ${HTTP_STATUS}"
          [ "${HTTP_STATUS}" = "204" ] || {
            echo "ERROR: Failed to dispatch model_pipeline.yml (HTTP ${HTTP_STATUS})"
            exit 1
          }
          echo "model_pipeline.yml dispatched successfully."

      - name: Notify Slack — retraining triggered
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "${SLACK_WEBHOOK_URL}" ] && { echo "No Slack webhook, skipping."; exit 0; }
          SUMMARY="${{ needs.monitor.outputs.metrics_summary }}"
          curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"⚠️ FitSenseAI model decay detected — retraining triggered.\n*Metrics*: ${SUMMARY}\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ---------------------------------------------------------------------------
  # Job 4: Notify healthy — no action needed
  # ---------------------------------------------------------------------------
  notify-healthy:
    name: Notify — model is healthy
    runs-on: ubuntu-latest
    needs: monitor
    if: needs.monitor.outputs.thresholds_passed == 'true'

    steps:
      - name: Notify Slack — all thresholds passed
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "${SLACK_WEBHOOK_URL}" ] && { echo "No Slack webhook, skipping."; exit 0; }
          SUMMARY="${{ needs.monitor.outputs.metrics_summary }}"
          curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"✅ FitSenseAI monitor passed — model is healthy.\n*Metrics*: ${SUMMARY}\"}"
