name: Deploy Pipeline

# =============================================================================
# Manually triggered only. Lints and tests the deployment scripts first,
# then stops and restarts the GCE GPU VM so that the startup script re-runs
# and pulls the latest LoRA adapter from HuggingFace.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for this deployment"
        required: false
        default: "manual redeploy"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint and test deployment scripts
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Model-Deployment/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r Model-Deployment/requirements.txt

      - name: Lint with ruff
        run: ruff check Model-Deployment/

      - name: Run unit tests
        run: pytest Model-Deployment/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Deploy — restart GCE VM and verify vLLM is serving
  # ---------------------------------------------------------------------------
  deploy:
    name: Restart GCE instance and verify
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Stop GCE instance
        run: |
          echo "Stopping instance ${{ secrets.GCP_INSTANCE_NAME }} in zone ${{ secrets.GCP_ZONE }}..."
          gcloud compute instances stop "${{ secrets.GCP_INSTANCE_NAME }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet
          echo "Instance stopped."

      - name: Wait for stop to settle
        run: sleep 15

      - name: Start GCE instance
        run: |
          echo "Starting instance ${{ secrets.GCP_INSTANCE_NAME }}..."
          gcloud compute instances start "${{ secrets.GCP_INSTANCE_NAME }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet
          echo "Instance start command issued. Startup script will now run."

      - name: Wait for vLLM startup
        # First boot: ~5-10 min (downloads ~8 GB model weights).
        # Subsequent boots: ~30 s (reuses cached weights).
        # Wait 2 min then poll — avoids a fixed 10-min sleep on warm restarts.
        run: sleep 120

      - name: Verify deployment — poll /v1/models
        env:
          VLLM_API_URL: ${{ secrets.VLLM_API_URL }}
          VLLM_API_KEY: ${{ secrets.VLLM_API_KEY }}
        run: |
          HTTP_STATUS="000"
          for i in {1..5}; do
            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${VLLM_API_URL}/v1/models" \
              -H "Authorization: Bearer ${VLLM_API_KEY}" || echo "000")
            echo "Attempt $i/5 — HTTP ${HTTP_STATUS}"
            if [ "${HTTP_STATUS}" = "200" ]; then
              break
            fi
            [ $i -lt 5 ] && sleep 30
          done

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "ERROR: vLLM server did not become healthy after 5 attempts"
            exit 1
          fi

          MODELS=$(curl -sf "${VLLM_API_URL}/v1/models" \
            -H "Authorization: Bearer ${VLLM_API_KEY}")
          echo "Models response: ${MODELS}"

          echo "${MODELS}" | grep -q "fitsense" || {
            echo "ERROR: fitsense LoRA not found in /v1/models response"
            exit 1
          }
          echo "Deployment verified: fitsense LoRA is serving."

      - name: Notify Slack — success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "${SLACK_WEBHOOK_URL}" ] && { echo "No Slack webhook configured, skipping."; exit 0; }
          curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"✅ FitSenseAI redeployed successfully — fitsense LoRA is serving on GCE. Reason: ${{ github.event.inputs.reason }}\"}"

      - name: Notify Slack — failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "${SLACK_WEBHOOK_URL}" ] && { echo "No Slack webhook configured, skipping."; exit 0; }
          curl -sf -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"❌ FitSenseAI deployment FAILED — check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
